name: Bug report
description: Report a reproducible issue
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: 1) ... 2) ... 3) ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (redacted)
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Verification
      options:
        - label: I ran `npm run test`
        - label: I ran `npm run build`
